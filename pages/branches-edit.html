<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعديل فرع - Q1KEY Platform</title>
  <link rel="stylesheet" href="../css/styles.css?v=17">
  <script src="../js/i18n.js"></script>
  <style>
    /* Premium Cyber-Minimalist Design System - Sync with Institutions */
    :root {
      --neon-primary: #ef4444;
      --neon-secondary: #c084fc;
      --card-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.12);
    }

    .page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }

    .form-container-ultra {
      width: 100%;
      max-width: 900px;
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border-radius: 28px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
      position: relative;
      overflow: hidden;
    }

    .form-content-inner {
      padding: 3.5rem;
    }

    @media (max-width: 768px) {
      .form-content-inner {
        padding: 2rem;
      }
    }

    .section-title-premium {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: white;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 2rem;
    }

    .section-title-premium i {
      padding: 8px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 10px;
      color: var(--neon-primary);
    }

    .input-field-wrapper {
      margin-bottom: 1.5rem;
    }

    .input-label-clean {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 0.5rem;
      margin-right: 0.5rem;
    }

    .modern-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03) !important;
      border: 1px solid rgba(255, 255, 255, 0.06) !important;
      border-radius: 14px !important;
      padding: 0.9rem 1.1rem !important;
      color: white !important;
      font-size: 0.95rem !important;
      transition: all 0.3s ease !important;
    }

    .modern-input:focus {
      background: rgba(255, 255, 255, 0.05) !important;
      border-color: var(--neon-primary) !important;
      box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.1) !important;
      outline: none;
    }

    .toggle-modern {
      display: flex;
      flex-direction: row-reverse;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
      height: 48px;
    }

    .toggle-modern:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.05);
    }

    .btn-create-ultra {
      width: 100%;
      height: 56px;
      background: linear-gradient(135deg, #ef4444, #dc2626) !important;
      color: white !important;
      border: none !important;
      border-radius: 16px !important;
      font-weight: 800 !important;
      font-size: 1.05rem !important;
      cursor: pointer !important;
      margin-top: 1.5rem !important;
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3) !important;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
    }

    .btn-create-ultra:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 15px 35px rgba(239, 68, 68, 0.5) !important;
    }

    .info-strip {
      display: flex;
      justify-content: space-between;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 14px;
      margin-bottom: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .info-item {
      text-align: center;
      flex: 1;
    }

    .info-item .label {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
      display: block;
      margin-bottom: 0.25rem;
    }

    .info-item .val {
      font-size: 0.95rem;
      color: white;
      font-weight: bold;
    }

    .capacity-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 0.5rem;
      padding: 0 0.5rem;
    }

    .capacity-stats p {
      font-size: 0.75rem;
    }
  </style>
</head>

<body>
  <div id="sidebar"></div>

  <div class="main-content">
    <div id="header"></div>

    <div class="page-wrapper">
      <!-- Top Navigation -->
      <div class="w-full max-w-[900px] flex items-center mb-8 px-2">
        <a href="branches.html" class="flex items-center gap-2 text-secondary hover:text-white group">
          <span
            class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-white/10 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12" />
              <polyline points="12 19 5 12 12 5" />
            </svg>
          </span>
          <span class="font-bold text-sm tracking-wide">العودة للفروع</span>
        </a>
      </div>

      <div id="loadingContainer" class="form-container-ultra p-20 text-center">
        <div class="spinner mx-auto scale-125"></div>
        <p class="text-secondary mt-6">جاري تحميل بيانات الفرع...</p>
      </div>

      <form id="branchForm" class="form-container-ultra hidden">
        <div class="form-content-inner">

          <div class="section-title-premium">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
              <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
            <span>تعديل بيانات الفرع</span>
          </div>

          <!-- System Info Strip -->
          <div class="info-strip">
            <div class="info-item">
              <span class="label">معرف الفرع</span>
              <span class="val" id="branchIdVal">-</span>
            </div>
            <div class="info-item">
              <span class="label">المؤسسة</span>
              <span class="val" id="institutionNameVal">-</span>
            </div>
            <div class="info-item">
              <span class="label">تاريخ الإنشاء</span>
              <span class="val" id="createdAtVal">-</span>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="input-field-wrapper">
              <label class="input-label-clean">اسم الفرع <span style="color: #ef4444">*</span></label>
              <input type="text" id="name" class="modern-input" required>
            </div>
            <div class="input-field-wrapper">
              <label class="input-label-clean">هاتف التواصل</label>
              <input type="tel" id="phoneNumber" class="modern-input">
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="input-field-wrapper">
              <label class="input-label-clean">البريد الإلكتروني</label>
              <input type="email" id="email" class="modern-input">
            </div>
            <div class="input-field-wrapper" id="expirationDateWrapper">
              <label class="input-label-clean" data-i18n-key="common.expiration_date">تاريخ انتهاء الصلاحية</label>
              <input type="date" id="expirationDate" class="modern-input">
            </div>
          </div>

          <div class="input-field-wrapper">
            <label class="input-label-clean">الحد الأقصى للمبلغ المسموح به</label>
            <input type="number" id="maximumLoans" class="modern-input" min="0"
              placeholder="مثلاً: 50000 (اتركه فارغاً لمبالغ غير محدودة)">
            <p class="text-[10px] text-white/30 mt-1">اترك الحقل فارغاً لإلغاء السقف المالي</p>
            <div class="capacity-stats">
              <p class="text-secondary">إجمالي مبالغ القروض الحالية: <span id="currentLoans"
                  class="text-white font-bold">0</span></p>
              <p class="text-secondary">المبلغ المتاح للإقراض: <span id="availableCapacity"
                  class="text-white font-bold">0</span></p>
            </div>
            <div id="capacityWarning" class="hidden mt-2 p-3 rounded-xl bg-amber-500/10 border border-amber-500/20">
              <p class="text-xs text-amber-500">⚠️ تحذير: لا يمكن أن يكون المبلغ الجديد أقل من إجمالي مبالغ القروض
                النشطة حالياً
              </p>
            </div>
          </div>

          <div class="mb-8">
            <label class="toggle-modern w-full">
              <input type="checkbox" id="isActive" class="w-5 h-5 accent-emerald-500">
              <span class="text-sm font-bold text-white/70">الفرع نشط ومتاح للعمل</span>
            </label>
          </div>

          <!-- Error Alert -->
          <div id="errorMessage"
            class="hidden mt-4 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-center text-sm font-medium">
            <p></p>
          </div>

          <!-- Submit -->
          <button type="submit" id="submitButton" class="btn-create-ultra">
            حفظ التعديلات وتحديث الفرع
          </button>

        </div>
      </form>
    </div>
  </div>

  <script src="../js/api.js?v=5"></script>
  <script src="../js/ui-utils.js?v=9"></script>
  <script src="../components/sidebar.js?v=13"></script>
  <script src="../components/header.js?v=3"></script>
  <script>
    async function initPage() {
      await waitForI18n();
      if (!isAuthenticated()) { window.location.href = '../index.html'; return; }

      const user = getCurrentUser();
      document.getElementById('sidebar').innerHTML = createSidebar(user);
      document.getElementById('header').innerHTML = createHeader(t('branches.edit_branch'), '');
      initializeLanguageSwitcher();
      setActiveNav('branches');
      window.i18n.translatePage();

      // Hide expiration date for non-super-admins
      if (user.roleName !== 'Super Admin') {
        const expWrapper = document.getElementById('expirationDateWrapper');
        if (expWrapper) expWrapper.style.display = 'none';
      }

      const errBox = document.getElementById('errorMessage');

      const urlParams = new URLSearchParams(window.location.search);
      const branchId = urlParams.get('id');
      if (!branchId) { window.location.href = 'branches.html'; return; }

      let branchData = null;
      try {
        branchData = await api.branches.getById(branchId);
        document.getElementById('name').value = branchData.name;
        document.getElementById('phoneNumber').value = branchData.phoneNumber || '';
        document.getElementById('email').value = branchData.email || '';
        document.getElementById('maximumLoans').value = branchData.maximumLoans || 0;
        document.getElementById('isActive').checked = branchData.isActive;
        if (branchData.expirationDate) {
          document.getElementById('expirationDate').value = branchData.expirationDate.split('T')[0];
        }

        document.getElementById('branchIdVal').textContent = `#${branchData.branchId}`;
        document.getElementById('institutionNameVal').textContent = branchData.institution?.name || '---';
        document.getElementById('createdAtVal').textContent = formatDate(branchData.createdAt);
        document.getElementById('currentLoans').textContent = branchData.totalLoans || 0;

        updateCapacityDisplay();

        document.getElementById('loadingContainer').classList.add('hidden');
        document.getElementById('branchForm').classList.remove('hidden');
      } catch (e) {
        showToast('فشل تحميل بيانات الفرع', 'error');
        setTimeout(() => window.location.href = 'branches.html', 1500);
      }

      function updateCapacityDisplay() {
        const maxInput = document.getElementById('maximumLoans').value;
        const max = (maxInput === '' || parseInt(maxInput) === 0) ? 0 : parseInt(maxInput);
        const current = branchData?.totalLoans || 0;

        if (max === 0) {
          document.getElementById('availableCapacity').textContent = "غير محدود";
        } else {
          document.getElementById('availableCapacity').textContent = Math.max(0, max - current);
        }
        const warn = document.getElementById('capacityWarning');
        if (max > 0 && max < current) warn.classList.remove('hidden');
        else warn.classList.add('hidden');
      }

      document.getElementById('maximumLoans').addEventListener('input', updateCapacityDisplay);

      const form = document.getElementById('branchForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitButton = document.getElementById('submitButton');
        errBox.classList.add('hidden');

        const maxInput = document.getElementById('maximumLoans').value;
        const max = maxInput === '' ? 0 : parseInt(maxInput);

        if (max > 0 && max < (branchData?.totalLoans || 0)) {
          showError("الحد الأقصى للمبلغ المسموح به لا يمكن أن يكون أقل من إجمالي مبالغ القروض النشطة");
          return;
        }

        showConfirmModal({
          title: 'تأكيد التحديث',
          message: 'هل أنت متأكد من رغبتك في حفظ التغييرات على هذا الفرع؟',
          subMessage: branchData?.name || '',
          confirmText: 'حفظ التغييرات',
          icon: '📝',
          btnClass: 'btn-danger',
          onConfirm: async () => {
            submitButton.disabled = true;
            submitButton.innerHTML = `<div class='spinner' style='width:20px;height:20px;margin:auto;border-color:white'></div>`;

            try {
              const updateData = {
                name: document.getElementById('name').value.trim(),
                phoneNumber: document.getElementById('phoneNumber').value.trim(),
                maximumLoans: max, // Use the 'max' variable which is already Number() converted
                isActive: document.getElementById('isActive').checked
              };

              const email = document.getElementById('email').value.trim();
              if (email) updateData.email = email;

              const expDate = document.getElementById('expirationDate').value;
              if (expDate) updateData.expirationDate = expDate;

              await api.branches.update(branchId, updateData);
              showToast('تم تحديث الفرع بنجاح', 'success');
              setTimeout(() => window.location.href = 'branches.html', 1000);
            } catch (error) {
              showError(error.message || "فشل التحديث");
              submitButton.disabled = false;
              submitButton.innerHTML = "حفظ التعديلات وتحديث الفرع";
            }
          }
        });
      });

      function showError(msg) {
        errBox.querySelector('p').textContent = msg;
        errBox.classList.remove('hidden');
      }
    }
    initPage();
  </script>
</body>

</html>
