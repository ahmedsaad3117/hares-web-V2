<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Q1KEY Platform</title>
    <link rel="stylesheet" href="../css/styles.css?v=12">
    <script src="../js/i18n.js"></script>
</head>

<body>
    <div id="sidebar"></div>

    <div class="main-content">
        <div id="header"></div>

        <div class="page-content">
            <!-- Page Header -->
            <div class="flex items-center gap-3 mb-8"
                style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem;">
                <a href="products.html" class="btn btn-secondary" style="padding: 0.5rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12" />
                        <polyline points="12 19 5 12 12 5" />
                    </svg>
                </a>
                <div>
                    <h1 class="text-3xl font-bold text-white" data-i18n-key="products.view_page.title">Product Details
                    </h1>
                    <p class="text-secondary" data-i18n-key="products.view_page.subtitle">View product configuration</p>
                </div>
            </div>

            <!-- Loading -->
            <div id="loadingContainer" class="loading-container">
                <div class="spinner"></div>
            </div>

            <!-- Product Details -->
            <div id="productContainer" style="display: none;">
                <div class="glass-card p-6 mb-6">
                    <div class="flex items-center justify-between mb-6"
                        style="display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem;">
                        <div>
                            <h2 id="productName" class="text-2xl font-bold text-white mb-2"></h2>
                            <p class="text-muted"><span data-i18n-key="products.id">ID</span>: <span
                                    id="productId"></span></p>
                        </div>
                        <div class="flex gap-2" style="display: flex; gap: 0.5rem; align-items: center;">
                            <span id="statusBadge" class="badge"></span>
                            <div class="meatball-container">
                                <button class="meatball-btn">⋮</button>
                                <div class="meatball-dropdown">
                                    <a id="editBtn" class="dropdown-item">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                                            <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                                        </svg>
                                        <span data-i18n-key="common.button.edit">Edit</span>
                                    </a>
                                    <button id="toggleBtn" class="dropdown-item">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <circle cx="12" cy="12" r="10" />
                                            <line x1="12" y1="8" x2="12" y2="12" />
                                            <line x1="12" y1="16" x2="12.01" y2="16" />
                                        </svg>
                                        <span id="toggleText">Deactivate</span>
                                    </button>
                                    <button id="deleteBtn" class="dropdown-item text-danger">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <polyline points="3 6 5 6 21 6" />
                                            <path
                                                d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                                        </svg>
                                        <span data-i18n-key="common.button.delete">Delete</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6"
                        style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem;">
                        <div>
                            <p class="text-muted mb-1" data-i18n-key="products.description">Description</p>
                            <p id="productDescription" class="text-white font-medium"></p>
                        </div>
                        <div>
                            <p class="text-muted mb-1" data-i18n-key="products.scope">Scope</p>
                            <p id="productScope" class="text-white font-medium"></p>
                        </div>
                        <div>
                            <p class="text-muted mb-1" data-i18n-key="products.created">Created At</p>
                            <p id="createdAt" class="text-white font-medium"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/api.js?v=4"></script>
    <script src="../js/ui-utils.js?v=3"></script>
    <script src="../components/sidebar.js?v=12"></script>
    <script src="../components/header.js?v=3"></script>
    <script>
        let productData = null;

        async function initPage() {
            await waitForI18n();
            if (!isAuthenticated()) {
                window.location.href = '../index.html';
                return;
            }

            // Refresh profile to get latest subscription data
            try {
                await api.auth.getProfile();
            } catch (e) {
                console.error('Failed to refresh profile:', e);
            }

            const user = getCurrentUser();
            document.getElementById('sidebar').innerHTML = createSidebar(user);
            document.getElementById('header').innerHTML = createHeader(t('products.view_page.title'), t('products.view_page.subtitle'));
            initializeLanguageSwitcher();
            setActiveNav('products');
            window.i18n.translatePage();

            await loadProduct();
            initMeatballMenu();

            // Enforce RTL if Arabic, but keep Header LTR (Name Left, Actions Right)
            if (localStorage.getItem('locale') !== 'en') {
                document.documentElement.dir = 'rtl';
                document.getElementById('productContainer').style.direction = 'rtl';

                // REVERSE HEADER: Keep Name Left and Actions Right (LTR) even in Arabic
                const headerRow = document.querySelector('#productContainer .glass-card > .flex.items-center.justify-between');
                if (headerRow) headerRow.style.direction = 'ltr';
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        async function loadProduct() {
            try {
                productData = await api.products.getById(productId);

                document.getElementById('productName').textContent = productData.name;
                document.getElementById('productId').textContent = productData.productId;
                document.getElementById('productDescription').textContent = productData.description || 'No description';
                document.getElementById('createdAt').textContent = formatDateTime(productData.createdAt);

                let scope = t('products.global');
                if (productData.branchId) scope = `${t('products.branch_scope')}: ${translateData(productData.branch?.name)}`;
                else if (productData.institutionId) scope = `${t('products.institution_scope')}: ${translateData(productData.institution?.name)}`;
                document.getElementById('productScope').textContent = scope;

                const statusBadge = document.getElementById('statusBadge');
                statusBadge.textContent = productData.isActive ? t('products.active') : t('products.inactive');
                statusBadge.className = `badge ${productData.isActive ? 'badge-success' : 'badge-danger'}`;

                document.getElementById('toggleText').textContent = productData.isActive ? t('products.deactivate') : t('products.activate');
                document.getElementById('editBtn').href = `products-edit.html?id=${productId}`;

                document.getElementById('loadingContainer').style.display = 'none';
                document.getElementById('productContainer').style.display = 'block';

                // Load statistics for integrity check
                await loadStatistics();
                setupActions();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadStatistics() {
            try {
                const stats = await apiRequest(`/products/${productId}/statistics`);
                productData.stats = stats;
            } catch (error) {
                console.error('Error loading product statistics:', error);
            }
        }

        function setupActions() {
            const deleteBtn = document.getElementById('deleteBtn');
            const toggleBtn = document.getElementById('toggleBtn');
            const productContainer = document.getElementById('productContainer');

            // Check integrity: totalLoans
            const hasLoans = productData.stats && productData.stats.totalLoans > 0;

            if (hasLoans) {
                deleteBtn.disabled = true;
                deleteBtn.classList.add('opacity-50');
                deleteBtn.title = t('products.delete_prevented_hint') || 'Cannot delete product with existing loans';

                // Add a warning message
                const warningBox = document.createElement('div');
                warningBox.style.padding = '0.75rem';
                warningBox.style.background = 'rgba(239, 68, 68, 0.1)';
                warningBox.style.border = '1px solid rgba(239, 68, 68, 0.2)';
                warningBox.style.borderRadius = '8px';
                warningBox.style.marginTop = '1rem';
                warningBox.innerHTML = `
                    <p class="text-sm text-danger" style="display: flex; align-items: center; gap: 0.5rem;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        ${t('products.delete_prevented_msg', { count: productData.stats.totalLoans })}
                    </p>
                `;
                productContainer.prepend(warningBox);
            } else {
                deleteBtn.addEventListener('click', () => {
                    showDeleteModal({
                        title: t('products.delete_confirm_title') || 'Delete Product',
                        itemName: productData.name,
                        warningText: t('products.delete_warning') || 'Are you sure? This action will permanently remove the product configuration.',
                        onConfirm: async () => {
                            try {
                                await api.products.delete(productId);
                                showToast('Product deleted', 'success');
                                window.location.href = 'products.html';
                            } catch (error) {
                                console.error('Delete failed:', error);
                                showToast(error.message || 'Delete failed', 'error');
                            }
                        }
                    });
                });
            }

            toggleBtn.addEventListener('click', async () => {
                const action = productData.isActive ? 'deactivate' : 'activate';
                const actionText = productData.isActive ? t('products.deactivate') || 'تعطيل' : t('products.activate') || 'تفعيل';

                showConfirmModal({
                    title: actionText + ' ' + (t('products.product') || 'المنتج'),
                    message: `هل أنت متأكد من ${actionText} هذا المنتج؟`,
                    subMessage: productData.name,
                    confirmText: actionText,
                    icon: productData.isActive ? '⏸️' : '▶️',
                    btnClass: productData.isActive ? 'btn-warning' : 'btn-success',
                    onConfirm: async () => {
                        try {
                            await api.products.toggleActive(productId);
                            showToast(`Product ${action}d`, 'success');
                            loadProduct();
                        } catch (e) {
                            showToast('Toggle failed', 'error');
                        }
                    }
                });
            });
        }

        initPage();
    </script>
</body>

</html>
