<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Customer - Q1KEY Platform</title>
  <link rel="stylesheet" href="../css/styles.css?v=12">
  <script src="../js/i18n.js"></script>
</head>

<body>
  <div id="sidebar"></div>

  <div class="main-content">
    <div id="header"></div>

    <div class="page-content">
      <!-- Page Header -->
      <!-- Page Header -->
      <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-3">
          <a href="customers.html" class="btn btn-secondary p-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12" />
              <polyline points="12 19 5 12 12 5" />
            </svg>
          </a>
          <div>
            <h1 class="text-3xl font-bold text-white" data-i18n-key="customers.edit_page.title">تعديل بيانات العميل</h1>
            <p class="text-secondary" data-i18n-key="customers.edit_page.subtitle">تحديث المعلومات الشخصية</p>
          </div>
        </div>

        <!-- Action Menu Removed -->
      </div>

      <!-- Loading -->
      <div id="loadingContainer" class="loading-container">
        <div class="spinner"></div>
      </div>

      <!-- Form -->
      <!-- Form -->
      <div id="formContainer" class="glass-card p-6 hidden max-w-3xl">
        <form id="customerForm">
          <!-- Name -->
          <div class="form-group">
            <label class="label" data-i18n-key="customers.form.name_label">Customer Name</label> <span
              data-i18n-key="customers.form.name_required">*</span>
            <input type="text" id="name" name="name" class="input"
              data-i18n-placeholder="customers.form.name_placeholder" placeholder="Enter customer name" required />
            <div id="nameError" class="error-text hidden"></div>
          </div>

          <!-- National ID -->
          <div class="form-group">
            <label class="label" data-i18n-key="customers.form.national_id_label">National ID</label> <span
              data-i18n-key="customers.form.national_id_required">*</span>
            <input type="text" id="nationalId" name="nationalId" class="input"
              data-i18n-placeholder="customers.form.national_id_placeholder" placeholder="Enter national ID" required />
            <div id="nationalIdError" class="error-text hidden"></div>
          </div>

          <!-- Phone Number -->
          <div class="form-group">
            <label class="label" data-i18n-key="customers.form.phone_label">Phone Number</label> <span
              data-i18n-key="customers.form.phone_required">*</span>
            <input type="tel" id="phoneNumber" name="phoneNumber" class="input"
              data-i18n-placeholder="customers.form.phone_placeholder" placeholder="+1234567890" required />
            <div id="phoneNumberError" class="error-text hidden"></div>
          </div>

          <!-- Error Message -->
          <div id="errorMessage" class="hidden mb-6 glass-card p-3 border border-red-500/20 bg-red-500/10">
            <p class="text-sm text-red-500 text-center"></p>
          </div>

          <!-- Buttons -->
          <div class="flex items-center justify-end gap-3 mt-8">
            <a href="customers.html" class="btn btn-secondary px-6" data-i18n-key="customers.form.cancel">إلغاء</a>
            <button type="submit" id="submitButton" class="btn btn-primary px-8">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
              <span data-i18n-key="customers.form.update_customer">حفظ التعديلات</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../js/api.js?v=4"></script>
  <script src="../js/ui-utils.js?v=5"></script>
  <script src="../components/sidebar.js?v=12"></script>
  <script src="../components/header.js?v=3"></script>
  <script>
    async function initPage() {
      await waitForI18n();

      if (!isAuthenticated()) {
        window.location.href = '../index.html';
        return;
      }

      // Refresh profile to get latest subscription data
      try {
        await api.auth.getProfile();
      } catch (e) {
        console.error('Failed to refresh profile:', e);
      }

      const user = getCurrentUser();
      document.getElementById('sidebar').innerHTML = createSidebar(user);
      document.getElementById('header').innerHTML = createHeader(
        t('customers.edit_customer'),
        t('customers.update_customer_info')
      );
      initializeLanguageSwitcher();
      setActiveNav('customers');
      window.i18n.translatePage();

      const form = document.getElementById('customerForm');
      const submitButton = document.getElementById('submitButton');
      const errorMessage = document.getElementById('errorMessage');
      const loadingContainer = document.getElementById('loadingContainer');
      const formContainer = document.getElementById('formContainer');

      // Get customer ID from URL
      const urlParams = new URLSearchParams(window.location.search);
      const customerId = urlParams.get('id');

      if (!customerId) {
        window.location.href = 'customers.html';
      }

      // Load customer data
      async function loadCustomer(retryCount = 0) {
        try {
          const customer = await api.customers.getById(customerId);

          // Populate form
          document.getElementById('name').value = customer.name;
          document.getElementById('nationalId').value = customer.nationalId;
          document.getElementById('phoneNumber').value = customer.phoneNumber;

          loadingContainer.classList.add('hidden');
          formContainer.classList.remove('hidden');
        } catch (error) {
          console.error('Error loading customer:', error);

          // Retry up to 3 times for network errors
          if (retryCount < 3 && (error.message === 'Failed to fetch' || error.name === 'TypeError')) {
            console.log(`Retrying... attempt ${retryCount + 1}`);
            await new Promise(resolve => setTimeout(resolve, 1000)); // Wait 1 second
            return loadCustomer(retryCount + 1);
          }

          showToast(t('customers.load_failed') || 'Failed to load customer', 'error');
          // Only redirect after exhausting retries
          if (retryCount >= 3) {
            setTimeout(() => window.location.href = 'customers.html', 3000);
          }
        }
      }

      loadCustomer();

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        console.log('Submit clicked');

        if (typeof showConfirmModal === 'undefined') {
          alert('Please refresh the page / يرجى تحديث الصفحة');
          return;
        }

        // Clear errors
        errorMessage.classList.add('hidden');
        document.getElementById('nameError').classList.add('hidden');
        document.getElementById('nationalIdError').classList.add('hidden');
        document.getElementById('phoneNumberError').classList.add('hidden');

        // Get form data
        const formData = {
          name: document.getElementById('name').value.trim(),
          nationalId: document.getElementById('nationalId').value.trim(),
          phoneNumber: document.getElementById('phoneNumber').value.trim(),
        };

        // Validation
        let hasError = false;

        if (formData.name.length < 2) {
          document.getElementById('nameError').textContent = 'Name must be at least 2 characters';
          document.getElementById('nameError').classList.remove('hidden');
          hasError = true;
        }

        if (formData.nationalId.length < 3) {
          document.getElementById('nationalIdError').textContent = 'National ID is required';
          document.getElementById('nationalIdError').classList.remove('hidden');
          hasError = true;
        }

        if (formData.phoneNumber.length < 10) {
          document.getElementById('phoneNumberError').textContent = 'Valid phone number is required';
          document.getElementById('phoneNumberError').classList.remove('hidden');
          hasError = true;
        }

        if (hasError) return;

        // Show confirmation modal
        showConfirmModal({
          title: t('customers.form.confirm_update_title') || 'Confirm Update',
          message: t('customers.form.confirm_update_message') || 'Are you sure you want to update this customer?',
          confirmText: t('customers.form.update_customer') || 'Update Customer',
          icon: '📝',
          onConfirm: async () => {
            try {
              // Disable submit button inside confirm callback
              submitButton.disabled = true;
              submitButton.innerHTML = '<div class="spinner border-2 w-5 h-5"></div> ' + (t('customers.form.updating') || 'جاري التحديث...');

              await api.customers.update(customerId, formData);
              showToast(t('customers.form.updated_success') || 'Customer updated successfully', 'success');
              setTimeout(() => {
                window.location.href = 'customers.html';
              }, 1000);
            } catch (error) {
              console.error('Error updating customer:', error);
              errorMessage.querySelector('p').textContent = error.message || t('customers.form.update_failed') || 'Failed to update customer';
              errorMessage.classList.remove('hidden');
              resetButton();
            }
          },
          onCancel: () => {
            // Do nothing, just re-enable if logic was shared
          }
        });

        function resetButton() {
          submitButton.disabled = false;
          submitButton.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          ${t('customers.form.update_customer') || 'Update Customer'}
        `;
        }
      });

      // initMeatballMenu removed
    }

    // deleteCustomer function removed

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPage);
    } else {
      initPage();
    }
  </script>
</body>

</html>
