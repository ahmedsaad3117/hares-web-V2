<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>العملاء المحذوفين - Q1KEY Platform</title>
  <link rel="stylesheet" href="../css/styles.css?v=12">
  <script src="../js/i18n.js"></script>
</head>

<body>
  <div id="sidebar"></div>

  <div class="main-content">
    <div id="header"></div>

    <div class="page-content">
      <!-- Page Header -->
      <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
        <div class="flex items-center gap-4">
          <div
            class="w-14 h-14 rounded-2xl bg-gradient-to-br from-red-500/20 to-red-600/30 flex items-center justify-center border border-red-500/30 text-red-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18" />
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
            </svg>
          </div>
          <div>
            <h1 class="text-white text-3xl font-bold m-0" data-i18n-key="customers.deleted_customers_title">
              العملاء المحذوفين
            </h1>
            <p class="text-slate-400 text-base mt-1" id="customerCount">جاري التحميل...</p>
          </div>
        </div>
        <a href="customers.html" class="btn btn-secondary p-3 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5" />
            <path d="M12 19l-7-7 7-7" />
          </svg>
          <span data-i18n-key="customers.show_active">العودة للعملاء النشطين</span>
        </a>
      </div>

      <!-- Search Section -->
      <div class="mb-6 glass-card p-4">
        <div class="relative">
          <svg class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none"
            xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" id="searchInput" class="input pe-12"
            placeholder="البحث بالاسم أو رقم الهوية أو رقم الهاتف..." />
        </div>
      </div>

      <!-- Customers Grid -->
      <div id="customersGrid" class="grid-responsive-lg gap-5">
        <div class="col-span-full text-center py-12">
          <div class="spinner mx-auto"></div>
          <p class="text-slate-400 mt-4">جاري تحميل العملاء المحذوفين...</p>
        </div>
      </div>

      <!-- Pagination -->
      <div id="paginationContainer" class="pagination-container"></div>
    </div>
  </div>

  <script src="../js/api.js?v=4"></script>
  <script src="../js/ui-utils.js?v=3"></script>
  <script src="../components/sidebar.js?v=12"></script>
  <script src="../components/header.js?v=3"></script>
  <script src="../components/pagination.js"></script>
  <script>
    // Global variables
    let user = null;
    let allDeletedCustomers = [];
    let filteredCustomers = [];
    let currentPage = 1;
    let totalPages = 1;
    const pageSize = 12;
    let searchTimeout;

    // Initialize page
    async function initPage() {
      await waitForI18n();

      // Check authentication
      if (!isAuthenticated()) {
        window.location.href = '../index.html';
        return;
      }

      const user = getCurrentUser();

      // Refresh profile to get latest subscription data
      try {
        await api.auth.getProfile();
      } catch (e) {
        console.error('Failed to refresh profile:', e);
      }
      document.getElementById('sidebar').innerHTML = createSidebar(user);
      document.getElementById('header').innerHTML = createHeader(
        t('customers.deleted_customers_title') || 'العملاء المحذوفين',
        'إدارة العملاء المحذوفين'
      );
      initializeLanguageSwitcher();
      setActiveNav('customers');

      // Translate static content
      window.i18n.translatePage();

      // Load deleted customers
      await loadDeletedCustomers();

      // Setup search
      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('input', () => {
          clearTimeout(searchTimeout);
          searchTimeout = setTimeout(performSearch, 300);
        });
      }
    }

    // Load deleted customers
    async function loadDeletedCustomers(page = 1) {
      const grid = document.getElementById('customersGrid');
      const countText = document.getElementById('customerCount');

      // Show loading
      grid.innerHTML = `
        <div class="col-span-full text-center py-12">
          <div class="spinner mx-auto"></div>
          <p class="text-slate-400 mt-4">جاري تحميل العملاء المحذوفين...</p>
        </div>
      `;

      try {
        const response = await api.customers.getAll(page, pageSize, true);
        allDeletedCustomers = response.data;
        filteredCustomers = [...allDeletedCustomers];
        currentPage = response?.meta?.page;
        totalPages = response?.meta?.totalPages;

        const totalCount = response.meta.total || allDeletedCustomers.length;
        countText.textContent = `${totalCount} عميل محذوف`;

        renderCustomers(filteredCustomers);
      } catch (error) {
        console.error('Error loading deleted customers:', error);
        countText.textContent = 'خطأ في التحميل';
        grid.innerHTML = `
          <div class="col-span-full text-center py-16 px-8">
            <div class="w-20 h-20 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-6 text-red-500">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
            </div>
            <h3 class="text-red-500 text-xl font-bold mb-2">فشل في التحميل</h3>
            <p class="text-slate-400 text-base mb-4">حدث خطأ أثناء تحميل العملاء المحذوفين</p>
            <button onclick="loadDeletedCustomers()" class="btn btn-primary">إعادة المحاولة</button>
          </div>
        `;
      }
    }

    // Search functionality
    function performSearch() {
      const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();

      if (!searchTerm) {
        filteredCustomers = [...allDeletedCustomers];
      } else {
        filteredCustomers = allDeletedCustomers.filter(customer => {
          return customer.name.toLowerCase().includes(searchTerm) ||
            customer.nationalId.includes(searchTerm) ||
            customer.phoneNumber.includes(searchTerm);
        });
      }

      renderCustomers(filteredCustomers);

      // Update count
      document.getElementById('customerCount').textContent =
        searchTerm ? `${filteredCustomers.length} نتيجة بحث` : `${allDeletedCustomers.length} عميل محذوف`;
    }

    // Render customers
    function renderCustomers(customers) {
      const grid = document.getElementById('customersGrid');

      if (customers.length === 0) {
        const searchTerm = document.getElementById('searchInput').value.trim();
        grid.innerHTML = `
          <div class="col-span-full text-center py-16 px-8">
            <div class="w-20 h-20 rounded-full bg-emerald-500/10 flex items-center justify-center mx-auto mb-6 text-emerald-500">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
            </div>
            <h3 class="text-emerald-500 text-2xl font-semibold mb-2">${searchTerm ? 'لم يتم العثور على نتائج' : 'لا يوجد عملاء محذوفين'}</h3>
            <p class="text-slate-400 text-base m-0">${searchTerm ? 'جرب البحث بكلمات مختلفة' : 'جميع العملاء نشطين في النظام'}</p>
          </div>
        `;
        // Clear pagination
        document.getElementById('paginationContainer').innerHTML = '';
        return;
      }

      const customersHTML = customers.map(customer => `
        <div class="glass-card hover-lift transition-all duration-300" style="padding: 1.5rem; border: 1px solid rgba(239, 68, 68, 0.2); background: rgba(15, 23, 42, 0.6); position: relative; overflow: hidden;">
          <!-- Red accent at top -->
          <div style="position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #ef4444, #991b1b);"></div>
          
          <div class="flex items-center justify-between mb-4" style="display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem;">
            <div class="flex items-center gap-3" style="display: flex; align-items: center; gap: 0.75rem;">
              <div style="width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #ef4444, #991b1b); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 1.25rem; box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);">
                ${customer.name.charAt(0).toUpperCase()}
              </div>
              <div>
                <h3 class="text-lg font-bold text-white mb-0" style="margin-bottom: 0;">${customer.name}</h3>
                <p class="text-xs text-slate-500">ID: ${customer.customerId}</p>
              </div>
            </div>
            <div class="badge badge-error" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); font-size: 0.7rem; padding: 0.25rem 0.6rem; border-radius: 20px;">
              ${t('common.status.deleted') || 'محذوف'}
            </div>
          </div>

          <!-- Deletion Details Box -->
          <div style="background: rgba(239, 68, 68, 0.05); border-radius: 12px; padding: 0.75rem; border: 1px solid rgba(239, 68, 68, 0.1); margin-bottom: 1.25rem;">
            <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="text-xs text-slate-400">حذف بواسطة:</span>
                <span class="text-xs font-medium text-red-200">${customer.deletedByName || 'غير معروف'}</span>
            </div>
            <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span class="text-xs text-slate-400">تاريخ الحذف:</span>
                <span class="text-xs font-medium text-red-200">${formatDate(customer.deletedAt)}</span>
            </div>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span class="text-xs text-slate-400">الفرع:</span>
                <span class="text-xs font-medium text-red-200">${customer.branchName || '-'}</span>
            </div>
          </div>

          <!-- Customer Data -->
          <div style="display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.5rem; padding: 0 0.25rem;">
            <div class="flex items-center gap-3" style="display: flex; align-items: center; gap: 0.75rem; color: #cbd5e1;">
              <svg style="width: 16px; height: 16px; color: #64748b;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M7 15h0M2 9.5h20"/>
              </svg>
              <span class="text-sm font-medium transition-colors hover:text-white" style="font-family: monospace; letter-spacing: 0.5px;">${customer.nationalId}</span>
            </div>
            <div class="flex items-center gap-3" style="display: flex; align-items: center; gap: 0.75rem; color: #cbd5e1;">
              <svg style="width: 16px; height: 16px; color: #64748b;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              <span class="text-sm font-medium transition-colors hover:text-white">${customer.phoneNumber}</span>
            </div>
          </div>

          <!-- Actions -->
          <div class="flex gap-2" style="display: flex; gap: 0.5rem;">
            <button onclick="restoreCustomer(${customer.customerId})" class="btn btn-success" style="flex: 2; display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.6rem; font-size: 0.85rem; border-radius: 10px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
              </svg>
              استعادة
            </button>
            ${(user && user.roleName === 'Super Admin') ? `
              <button onclick="hardDeleteCustomer(${customer.customerId})" class="btn btn-error" style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 0.6rem; border-radius: 10px;" title="حذف نهائي">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                </svg>
              </button>
            ` : ''}
          </div>
        </div>
      `).join('');

      grid.innerHTML = customersHTML;

      // Render pagination
      const paginationContainer = document.getElementById('paginationContainer');
      if (paginationContainer && totalPages > 1) {
        paginationContainer.innerHTML = createPagination(currentPage, totalPages, changePage);
      } else {
        paginationContainer.innerHTML = '';
      }
    }

    // Change page
    function changePage(page) {
      if (page < 1 || page > totalPages || page === currentPage) return;
      loadDeletedCustomers(page);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Restore customer
    window.restoreCustomer = function (id) {
      const customer = allDeletedCustomers.find(c => c.customerId === id);
      const name = customer ? customer.name : 'العميل';

      showConfirmModal({
        title: 'استعادة العميل',
        message: 'هل أنت متأكد من استعادة هذا العميل؟ سيعود لقائمة العملاء النشطين.',
        subMessage: name,
        confirmText: 'استعادة',
        icon: '↺',
        btnClass: 'btn-success',
        onConfirm: async () => {
          try {
            await api.customers.restore(id);
            showToast('تم استعادة العميل بنجاح', 'success');
            await loadDeletedCustomers(currentPage);
          } catch (error) {
            console.error('Error restoring customer:', error);
            showToast(error.message || 'فشل في استعادة العميل', 'error');
          }
        }
      });
    };

    // Hard delete customer
    window.hardDeleteCustomer = function (id) {
      const customer = allDeletedCustomers.find(c => c.customerId === id);
      const name = customer ? customer.name : 'العميل';

      showDeleteModal({
        title: 'حذف نهائي',
        itemName: name,
        warningText: 'تحذير: سيتم حذف العميل وجميع البيانات المرتبطة نهائياً.\nلا يمكن التراجع عن هذا الإجراء.',
        confirmText: 'نعم، حذف نهائي',
        onConfirm: async () => {
          try {
            await api.customers.delete(id);
            showToast('تم حذف العميل نهائياً', 'success');
            await loadDeletedCustomers(currentPage);
          } catch (error) {
            console.error('Error deleting customer:', error);
            showToast(error.message || 'فشل في الحذف', 'error');
          }
        }
      });
    };

    // Start
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPage);
    } else {
      initPage();
    }
  </script>
</body>

</html>
