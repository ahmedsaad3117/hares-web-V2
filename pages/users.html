<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - Q1KEY Platform</title>
  <link rel="stylesheet" href="../css/styles.css?v=12">
  <script src="../js/i18n.js"></script>
</head>

<body>
  <div id="sidebar"></div>

  <div class="main-content">
    <div id="header"></div>

    <div class="page-content">
      <!-- Page Header -->
      <div class="flex items-center justify-between mb-8"
        style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;">
        <div class="flex items-center gap-3" style="display: flex; align-items: center; gap: 0.75rem;">
          <div style="font-size: 2rem;">👤</div>
          <div>
            <h1 class="text-3xl font-bold text-white" data-i18n-key="users.title">${t('users.title')}</h1>
            <p class="text-secondary" data-i18n-key="users.user_details">${t('users.user_details')}</p>
          </div>
        </div>
        <a href="users-new.html" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          <span data-i18n-key="users.add_user">${t('users.add_user')}</span>
        </a>
      </div>

      <!-- Search & Filters -->
      <div class="mb-6">
        <div class="relative">
          <input type="text" id="searchInput" class="input pl-10" data-i18n-placeholder="users.search_placeholder"
            placeholder="Search by name, email, institution..." style="padding-inline-start: 2.5rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="position: absolute; inset-inline-start: 0.75rem; top: 50%; transform: translateY(-50%); color: #94a3b8;">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </div>
      </div>

      <!-- Users Table -->
      <div class="glass-card">
        <div class="table-container">
          <table class="table">
            <thead>
              <tr>
                <th data-i18n-key="users.id" style="text-align: center;">${t('users.id')}</th>
                <th data-i18n-key="users.name" style="text-align: center;">${t('users.name')}</th>
                <th data-i18n-key="users.email" style="text-align: center;">${t('users.email')}</th>
                <th data-i18n-key="users.role" style="text-align: center;">${t('users.role')}</th>
                <th data-i18n-key="users.institution_branch" style="text-align: center;">
                  ${t('users.institution')}/${t('users.branch')}</th>
                <th data-i18n-key="users.status" style="text-align: center;">${t('users.status')}</th>
                <th data-i18n-key="users.actions" style="text-align: center;">${t('users.actions')}</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr>
                <td colspan="8" style="text-align: center; padding: 3rem;">
                  <div class="spinner" style="margin: 0 auto;"></div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div id="paginationContainer" class="pagination-container"></div>
      </div>
    </div>
  </div>

  <script src="../js/api.js?v=4"></script>
  <script src="../js/ui-utils.js?v=3"></script>
  <script src="../components/sidebar.js?v=12"></script>
  <script src="../components/header.js?v=3"></script>
  <script src="../components/pagination.js"></script>
  <script>
    let user;
    let currentPage = 1;
    let totalPages = 1;
    const pageSize = 10;
    let currentSearch = '';

    async function initPage() {
      await waitForI18n();

      // Check authentication
      if (!requireAuth()) return;

      // Refresh profile to get latest subscription data
      try {
        await api.auth.getProfile();
      } catch (e) {
        console.error('Failed to refresh profile:', e);
      }

      user = getCurrentUser();

      // Only Super Admin and Institution can access
      if (user.roleName !== 'Super Admin' && user.roleName !== 'Institution') {
        window.location.href = 'dashboard.html';
        return;
      }

      document.getElementById('sidebar').innerHTML = createSidebar(user);
      document.getElementById('header').innerHTML = createHeader(
        t('users.title'),
        t('users.user_details')
      );
      initializeLanguageSwitcher();
      setActiveNav('users');

      // Setup search
      const searchInput = document.getElementById('searchInput');
      searchInput.addEventListener('input', debounce((e) => {
        currentSearch = e.target.value.trim();
        currentPage = 1;
        loadUsers();
      }, 500));

      // Load users
      loadUsers();

      // Enable auto-refresh (every 10 seconds)
      if (window.setupAutoRefresh) {
        window.setupAutoRefresh(() => loadUsers(currentPage), 10000);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPage);
    } else {
      initPage();
    }

    async function loadUsers(page = 1) {
      // If passing explicit page arg, update currentPage used by other functions, else use global
      if (page) currentPage = page;

      try {
        const response = await api.users.getAll(currentPage, pageSize, currentSearch);

        // Safety check if response structure changed
        if (!response || !response.data) {
          throw new Error("Invalid response format");
        }

        currentPage = response?.meta?.page;
        totalPages = response?.meta?.totalPages;

        // Filter users by institution if user is Institution role 
        // Note: For Institution role, backend should ideally handle this security, 
        // but existing logic was frontend filtering. 
        // If we are searching, we might get users from other institutions if backend isn't secured?
        // UsersService.findAll currently doesn't restrict by institutionId for non-super-admins.
        // This is a security gap if not handled in Controller/Service, but I will maintain frontend filter as legacy logic for now
        // Server-side filtering is now correctly implemented for Institution admins.
        let users = response.data;

        // console.log('Loaded users:', users);
        console.log('Current User Role:', user.roleName);
        renderUsers(users);
      } catch (error) {
        console.error('Error loading users:', error);
        showToast(t('users.failed_to_load'), 'error');
        document.getElementById('usersTableBody').innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 2rem; color: #94a3b8;">${t('users.failed_to_load')}</td></tr>`;
      }
    }

    function changePage(page) {
      if (page < 1 || page > totalPages || page === currentPage) return;
      loadUsers(page);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderUsers(users) {
      const tbody = document.getElementById('usersTableBody');

      if (users.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; padding: 2rem; color: #94a3b8;">${t('users.no_users')}</td></tr>`;
        return;
      }

      const usersHTML = users.map(usr => `
        <tr>
          <td class="text-center align-middle"><span class="font-semibold text-secondary">#${usr.userId}</span></td>
          <td class="text-center align-middle">
            <div class="flex items-center justify-center">
              <span class="font-medium text-white whitespace-nowrap">${usr.name}</span>
            </div>
          </td>
          <td class="text-secondary text-center align-middle">${usr.email}</td>
          <td class="text-center align-middle">
            <span class="badge badge-info">${usr.roleName === 'Super Admin' ? t('users.roles.super_admin') : usr.roleName === 'Institution' ? t('users.roles.institution') : usr.roleName === 'Branch' ? t('users.roles.branch') : usr.roleName || ''}</span>
          </td>
          <td class="text-secondary text-center align-middle">
            <div class="flex items-center justify-center flex-wrap gap-1">
              <span class="text-white font-medium whitespace-nowrap">${usr.institutionName || ''}</span>
              ${usr.branchName ? `
                <span class="text-secondary">,</span>
                <span class="font-medium whitespace-nowrap" style="color: #ea580c;">${usr.branchName}</span>
              ` : ''}
            </div>
          </td>
          <td class="text-center align-middle">
            <span class="badge ${usr.isActive ? 'badge-success' : 'badge-danger'}">
              ${usr.isActive ? t('users.active') : t('users.inactive')}
            </span>
          </td>
          <td>
            <div class="flex items-center gap-2" style="display: flex; gap: 0.5rem; justify-content: center;">
              
              ${(user.roleName === 'Super Admin' || user.roleName === 'Institution') ? `
                ${(usr.userId !== user.userId || user.email === 'admin@q1key.com') ? `
                <button onclick="forceLogoutUser(${usr.userId}, '${usr.name.replace(/'/g, "\\'")}')" class="btn btn-icon" title="${t('users.force_logout')}" style="background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2);">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                  </svg>
                </button>
                ` : ''}

                <a href="users-view.html?id=${usr.userId}" class="btn btn-secondary btn-icon" title="${t('users.view_details')}">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </a>

                <a href="users-edit.html?id=${usr.userId}" class="btn btn-secondary btn-icon" title="${t('users.edit')}">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </a>
              ` : ''}

              ${usr.phoneNumber ? `
                <button onclick="openWhatsapp('${usr.phoneNumber}')" class="btn-whatsapp btn-icon" title="WhatsApp">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.008-.57-.008-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                  </svg>
                </button>
              ` : ''}
            </div >
          </td >
        </tr >
      `).join('');

      tbody.innerHTML = usersHTML;

      // Render pagination
      const paginationContainer = document.getElementById('paginationContainer');
      if (paginationContainer) {
        paginationContainer.innerHTML = createPagination(currentPage, totalPages, changePage);
      }
    }

    async function toggleActive(id, currentStatus) {
      const action = currentStatus ? 'deactivate' : 'activate';
      const confirmKey = currentStatus ? 'users.deactivate_confirm' : 'users.activate_confirm';
      const actionText = currentStatus ? t('users.deactivate') : t('users.activate');

      showConfirmModal({
        title: actionText + ' ' + (t('users.user') || 'المستخدم'),
        message: t(confirmKey),
        confirmText: actionText,
        icon: currentStatus ? '⏸️' : '▶️',
        btnClass: currentStatus ? 'btn-warning' : 'btn-success',
        onConfirm: async () => {
          try {
            await api.users.toggleActive(id);
            const successKey = currentStatus ? 'users.deactivated_success' : 'users.activated_success';
            showToast(t(successKey), 'success');
            loadUsers(currentPage);
          } catch (error) {
            console.error('Error toggling user status:', error);
            showToast(t('users.update_failed'), 'error');
          }
        }
      });
    }

    async function forceLogoutUser(id, name) {
      showConfirmModal({
        title: t('users.force_logout'),
        message: `${t('users.force_logout_confirm')} ${name}؟`,
        subMessage: t('users.force_logout_desc'),
        confirmText: t('users.confirm_logout'),
        icon: '🔌',
        btnClass: 'btn-warning',
        onConfirm: async () => {
          try {
            await api.users.forceLogout(id);
            showToast(t('users.logout_success'), 'success');
          } catch (error) {
            console.error('Error logging out user:', error);
            showToast(error.message || t('users.logout_failed'), 'error');
          }
        }
      });
    }

    async function deleteUser(id) {
      showDeleteModal({
        title: t('users.delete_confirm_title'),
        itemName: `#${id}`,
        warningText: t('users.delete_confirm'),
        confirmText: t('common.button.delete'),
        onConfirm: async () => {
          try {
            await api.users.delete(id);
            showToast(t('users.deleted_success'), 'success');
            loadUsers(currentPage);
          } catch (error) {
            console.error('Error deleting user:', error);
            showToast(t('users.delete_failed'), 'error');
          }
        }
      });
    }
  </script>
</body>

</html>
