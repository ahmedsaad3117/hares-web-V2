<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Logs - Q1KEY Platform</title>
  <link rel="stylesheet" href="../css/styles.css?v=12">
  <script src="../js/i18n.js"></script>
</head>

<body>
  <div class="app-container">
    <div id="sidebar"></div>

    <div class="main-content">
      <div id="header"></div>

      <!-- Filters -->
      <div class="glass-card p-4 mb-6">
        <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;">
          <div style="flex: 1; min-width: 200px;">
            <label class="form-label" data-i18n-key="search_logs.search_text">Search by Customer or User</label>
            <input type="text" id="searchTextFilter" data-i18n-placeholder="search_logs.search_text_placeholder"
              placeholder="Enter customer or user name..." class="input" />
          </div>
          <div style="flex: 1; min-width: 200px;">
            <label class="form-label" data-i18n-key="search_logs.filter_by_customer">Filter by Customer ID</label>
            <input type="number" id="customerIdFilter" data-i18n-placeholder="search_logs.enter_customer_id"
              placeholder="Enter customer ID" class="input" />
          </div>
          <div style="flex: 1; min-width: 200px;">
            <label class="form-label" data-i18n-key="search_logs.filter_by_type">Filter by Search Type</label>
            <select id="searchTypeFilter" class="input">
              <option value="" data-i18n-key="search_logs.all_types">All Types</option>
              <option value="view" data-i18n-key="search_logs.view">View</option>
              <option value="search" data-i18n-key="search_logs.search">Search</option>
              <option value="edit" data-i18n-key="search_logs.edit">Edit</option>
              <option value="list" data-i18n-key="search_logs.list">List</option>
            </select>
          </div>
          <button onclick="applyFilters()" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
            </svg>
            <span data-i18n-key="search_logs.apply_filters">Apply Filters</span>
          </button>
          <button onclick="clearFilters()" class="btn btn-secondary" data-i18n-key="search_logs.clear">Clear</button>
        </div>
      </div>

      <!-- Search Logs Table -->
      <div class="glass-card">
        <div class="table-container">
          <table class="table">
            <thead>
              <tr>
                <th data-i18n-key="search_logs.log_id">Log ID</th>
                <th data-i18n-key="search_logs.customer">Customer</th>
                <th data-i18n-key="search_logs.user">User</th>
                <th data-i18n-key="search_logs.institution">Institution</th>
                <th data-i18n-key="search_logs.search_query">Search Query</th>
                <th data-i18n-key="search_logs.type">Type</th>
                <th data-i18n-key="search_logs.ip_address">IP Address</th>
                <th data-i18n-key="search_logs.date_time">Date & Time</th>
                <th data-i18n-key="search_logs.actions">Actions</th>
              </tr>
            </thead>
            <tbody id="searchLogsTableBody">
              <tr>
                <td colspan="9" style="text-align: center; padding: 3rem;">
                  <div class="spinner" style="margin: 0 auto;"></div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div id="paginationContainer" class="flex justify-center"
          style="display: flex; justify-content: center; margin-top: 2rem; padding: 1rem;"></div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="../js/api.js?v=4"></script>
  <script src="../components/sidebar.js?v=12"></script>
  <script src="../components/header.js?v=3"></script>
  <script src="../components/pagination.js"></script>
  <script>
    // Toast notification
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast show ${type === 'success' ? 'toast-success' : type === 'error' ? 'toast-error' : 'toast-info'}`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    let currentPage = 1;
    let totalPages = 1;
    const pageSize = 20;
    let currentFilters = {
      customerId: null,
      searchType: '',
      search: ''
    };

    // Load search logs with pagination
    async function loadSearchLogs(page = 1) {
      try {
        let response;

        if (currentFilters.customerId) {
          response = await api.searchLogs.getByCustomer(
            currentFilters.customerId,
            page,
            pageSize,
            currentFilters.searchType,
            currentFilters.search
          );
        } else {
          response = await api.searchLogs.getAll(
            page,
            pageSize,
            currentFilters.searchType,
            currentFilters.search
          );
        }

        currentPage = response?.meta?.page;
        totalPages = response?.meta?.totalPages;

        renderSearchLogs(response.data);
      } catch (error) {
        console.error('Error loading search logs:', error);
        showToast(t('search_logs.failed_to_load'), 'error');
        document.getElementById('searchLogsTableBody').innerHTML = `<tr><td colspan="9" style="text-align: center; padding: 2rem; color: #94a3b8;">${t('search_logs.failed_to_load')}</td></tr>`;
      }
    }

    function changePage(page) {
      if (page < 1 || page > totalPages || page === currentPage) return;
      loadSearchLogs(page);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function applyFilters() {
      const searchText = document.getElementById('searchTextFilter').value.trim();
      const customerId = document.getElementById('customerIdFilter').value;
      const searchType = document.getElementById('searchTypeFilter').value;

      currentFilters.search = searchText;
      currentFilters.customerId = customerId ? parseInt(customerId) : null;
      currentFilters.searchType = searchType;

      loadSearchLogs(1);
    }

    function clearFilters() {
      document.getElementById('searchTextFilter').value = '';
      document.getElementById('customerIdFilter').value = '';
      document.getElementById('searchTypeFilter').value = '';
      currentFilters = { customerId: null, searchType: '', search: '' };
      loadSearchLogs(1);
    }

    function renderSearchLogs(logs) {
      const tbody = document.getElementById('searchLogsTableBody');

      if (logs.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" style="text-align: center; padding: 2rem; color: #94a3b8;">${t('search_logs.no_logs')}</td></tr>`;
        return;
      }

      const typeColors = {
        view: '#0284c7',   // أزرق قوي
        search: '#7c3aed', // بنفسجي ملكي
        edit: '#d97706',   // برتقالي دافئ
        list: '#059669'    // أخضر زمردي
      };

      const logsHTML = logs.map(log => {
        const typeColor = typeColors[log.searchType] || '#64748b';

        return `
        <tr>
          <td>${log.searchLogId}</td>
          <td>
            <div>
              <div class="font-semibold text-white">${log.customerName}</div>
              <div class="text-sm text-muted">ID: ${log.customerId}</div>
            </div>
          </td>
          <td>
            <div>
              <div class="font-semibold text-white">${log.userName}</div>
              <div class="text-sm text-muted">${log.userEmail}</div>
            </div>
          </td>
          <td>
            <div class="text-secondary">${log.institutionName || '--'}</div>
          </td>
          <td>
            <div class="text-sm" style="max-width: 300px; overflow: hidden; text-overflow: ellipsis;" title="${log.searchQuery}">
              ${log.searchQuery
            .replace('View customer', t('search_logs.view') + ' ' + t('dashboard.activity.customer_generic'))
            .replace('Search for customer', t('search_logs.search') + ' ' + t('dashboard.activity.customer_generic'))
            .replace('Edit customer', t('search_logs.edit') + ' ' + t('dashboard.activity.customer_generic'))
            .replace('List customers', t('search_logs.list') + ' ' + t('customers.title'))}
            </div>
          </td>
          <td>
            <span style="padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; background: ${typeColor}; color: white; border: 1px solid ${typeColor};">
              ${t('search_logs.' + log.searchType) || log.searchType}
            </span>
          </td>
          <td class="text-sm text-muted">${log.ipAddress || 'N/A'}</td>
          <td class="text-sm">${formatDate(log.createdAt)}</td>
          <td>
            <div style="display: flex; gap: 0.5rem;">
              <a href="customers-view.html?id=${log.customerId}" class="btn btn-secondary" style="font-size: 0.75rem; padding: 0.375rem 0.75rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                ${t('search_logs.view_customer_btn')}
              </a>
              <button onclick="deleteLog(${log.searchLogId})" class="btn btn-danger" style="font-size: 0.75rem; padding: 0.375rem 0.75rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>
      `}).join('');

      tbody.innerHTML = logsHTML;

      // Render pagination
      const paginationContainer = document.getElementById('paginationContainer');
      if (paginationContainer) {
        paginationContainer.innerHTML = createPagination(currentPage, totalPages, changePage);
      }
    }

    async function deleteLog(id) {
      showDeleteModal({
        title: t('search_logs.delete_title') || 'حذف سجل البحث',
        itemName: `#${id}`,
        warningText: t('search_logs.delete_confirm') || 'هل أنت متأكد من حذف هذا السجل؟',
        confirmText: t('common.button.delete') || 'حذف',
        onConfirm: async () => {
          try {
            await api.searchLogs.delete(id);
            showToast(t('search_logs.deleted_success'), 'success');

            // Reload current page, or go to previous page if current page would be empty
            const response = currentFilters.customerId
              ? await api.searchLogs.getByCustomer(currentFilters.customerId, currentPage, pageSize)
              : await api.searchLogs.getAll(currentPage, pageSize);

            // If current page is empty and we're not on page 1, go to previous page
            if (response.data.length === 0 && currentPage > 1) {
              loadSearchLogs(currentPage - 1);
            } else {
              loadSearchLogs(currentPage);
            }
          } catch (error) {
            console.error('Error deleting search log:', error);
            showToast(t('search_logs.delete_failed'), 'error');
          }
        }
      });
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString('ar-SA', {
        month: 'long',
        day: 'numeric',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    async function initPage() {
      await waitForI18n();

      if (!isAuthenticated()) {
        window.location.href = '../index.html';
        return;
      }

      const user = getCurrentUser();

      // Refresh profile to get latest subscription data
      try {
        await api.auth.getProfile();
      } catch (e) {
        console.error('Failed to refresh profile:', e);
      }

      // Only Super Admin can access
      if (user.roleName !== 'Super Admin') {
        window.location.href = 'dashboard.html';
        return;
      }

      document.getElementById('sidebar').innerHTML = createSidebar(user);
      document.getElementById('header').innerHTML = createHeader(
        t('search_logs.title'),
        t('search_logs.search_history')
      );
      initializeLanguageSwitcher();
      setActiveNav('search-logs');
      window.i18n.translatePage();

      // Load search logs with pagination
      loadSearchLogs();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPage);
    } else {
      initPage();
    }
  </script>
</body>

</html>
