<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Loan - Q1KEY Platform</title>
  <link rel="stylesheet" href="../css/styles.css?v=19">
  <script src="../js/i18n.js?v=2"></script>
</head>

<body>
  <div id="sidebar"></div>

  <div class="main-content">
    <div id="header"></div>

    <div class="page-content">
      <!-- Page Header -->
      <div class="flex items-center gap-3 mb-8">
        <a href="loans.html" class="btn btn-secondary p-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
        </a>
        <div>
          <h1 class="text-3xl font-bold text-white" data-i18n-key="loans.edit_page.title">Edit Loan</h1>
          <p class="text-secondary" data-i18n-key="loans.edit_page.subtitle">Update loan information</p>
        </div>
      </div>

      <!-- Loading -->
      <div id="loadingContainer" class="loading-container">
        <div class="spinner"></div>
      </div>

      <!-- Form -->
      <div id="formContainer" style="display: none;">
        <div class="glass-card p-6" style="max-width: 800px;">
          <form id="loanForm">
            <!-- Customer (Read-only) -->
            <div class="form-group">
              <label class="label" data-i18n-key="loans.form.customer_label">Customer</label>
              <input type="text" id="customerName" class="input opacity-60 cursor-not-allowed bg-white-5" readonly />
              <p class="text-red-500 text-xs mt-1" data-i18n-key="loans.edit_page.customer_readonly">* Customer cannot
                be
                changed after loan creation</p>
            </div>

            <!-- Branch (Read-only) -->
            <div class="form-group">
              <label class="label" data-i18n-key="loans.form.branch_label">Branch</label>
              <input type="text" id="branchName" class="input opacity-60 cursor-not-allowed bg-white-5" readonly />
              <p class="text-red-500 text-xs mt-1" data-i18n-key="loans.edit_page.branch_readonly">* Branch cannot be
                changed after loan creation</p>
            </div>

            <!-- Product (Read-only) -->
            <div class="form-group">
              <label class="label" data-i18n-key="loans.form.product_label">Product</label>
              <input type="text" id="productName" class="input opacity-60 cursor-not-allowed bg-white-5" readonly />
              <p class="text-red-500 text-xs mt-1" data-i18n-key="loans.edit_page.product_readonly">* Product cannot be
                changed after loan creation</p>
            </div>

            <!-- Principal Amount -->
            <div class="form-group">
              <label class="label inline-block mb-2" data-i18n-key="loans.form.principal_amount">Principal
                Amount</label>
              <span class="text-red-500">*</span>
              <input type="number" id="principalAmount" name="principalAmount" class="input"
                data-i18n-placeholder="loans.form.principal_placeholder" placeholder="5000.00" step="0.01" min="0"
                required />
              <div id="principalAmountError" class="error-text hidden"></div>
            </div>

            <!-- Profit Amount -->
            <div class="form-group">
              <label class="label" data-i18n-key="loans.form.profit_amount">Profit Amount</label>
              <input type="number" id="profitAmount" name="profitAmount" class="input"
                data-i18n-placeholder="loans.form.profit_placeholder" placeholder="0.00" step="0.01" min="0" />
            </div>

            <!-- Payment Plan -->
            <div class="form-group">
              <label class="label inline-block mb-2" data-i18n-key="loans.form.payment_plan">Payment Plan
                (Months)</label>
              <span class="text-red-500">*</span>
              <select id="paymentPlanMonths" name="paymentPlanMonths" class="input" required></select>
            </div>

            <!-- Installment Preview -->
            <div id="installmentPreview" class="hidden glass-card p-4 border border-blue-500/20 bg-blue-500/10 mb-6">
              <p class="text-sm font-semibold text-white mb-3 flex items-center gap-2">
                <span>📋</span>
                <span data-i18n-key="loans.form.installment_preview">معاينة الأقساط</span>
              </p>
              <div class="grid-responsive-sm gap-4">
                <div>
                  <p class="text-muted text-xs" data-i18n-key="loans.form.monthly_payment">القسط الشهري</p>
                  <p id="monthlyPayment" class="text-white font-medium text-lg">--</p>
                </div>
                <div>
                  <p class="text-muted text-xs" data-i18n-key="loans.form.installment_count">عدد الأقساط</p>
                  <p id="installmentCount" class="text-white font-medium text-lg">--</p>
                </div>
              </div>
            </div>

            <!-- Due Date -->
            <div class="form-group">
              <label class="label inline-block mb-2" data-i18n-key="loans.form.due_date_label">Due Date</label>
              <span class="text-red-500">*</span>
              <input type="date" id="dueDate" name="dueDate" class="input" required />
              <div id="dueDateError" class="error-text hidden"></div>
            </div>

            <!-- Status -->
            <div class="form-group">
              <label class="label inline-block mb-2" data-i18n-key="common.label.status">Status</label>
              <span class="text-red-500">*</span>
              <select id="status" name="status" class="input" required>
                <option value="Active" data-i18n-key="loans.status.active">Active</option>
                <option value="Late" data-i18n-key="loans.status.late">Late</option>
                <option value="Paid" data-i18n-key="loans.status.paid">Paid</option>
                <option value="Finished" data-i18n-key="loans.status.finished">Finished</option>
              </select>
              <div id="statusError" class="error-text hidden"></div>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden mb-6 glass-card p-3 border border-red-500/20 bg-red-500/10">
              <p class="text-sm text-red-500 text-center"></p>
            </div>

            <!-- Form Actions -->
            <div class="flex items-center justify-end gap-3 mt-8">
              <a href="loans.html" class="btn btn-secondary" data-i18n-key="common.button.cancel">Cancel</a>
              <button type="submit" class="btn btn-primary" id="submitBtn"
                data-i18n-key="loans.edit_page.update_button">
                Update Loan
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="../js/api.js?v=4"></script>
  <script src="../components/sidebar.js?v=12"></script>
  <script src="../components/header.js?v=3"></script>
  <script>
    async function initPage() {
      await waitForI18n();

      if (!isAuthenticated()) {
        window.location.href = '../index.html';
        return;
      }

      // Refresh profile to get latest subscription data
      try {
        await api.auth.getProfile();
      } catch (e) {
        console.error('Failed to refresh profile:', e);
      }

      const user = getCurrentUser();
      document.getElementById('sidebar').innerHTML = createSidebar(user);
      document.getElementById('header').innerHTML = createHeader(
        t('loans.edit_loan'),
        t('loans.update_loan_info')
      );
      initializeLanguageSwitcher();
      setActiveNav('loans');

      // Apply translations
      i18n.translatePage();

      const loadingContainer = document.getElementById('loadingContainer');
      const formContainer = document.getElementById('formContainer');

      // Get loan ID from URL
      const urlParams = new URLSearchParams(window.location.search);
      const loanId = urlParams.get('id');

      if (!loanId) {
        window.location.href = 'loans.html';
      }

      let loanData = null;

      // Populate Payment Plan (1-36 months)
      function populatePaymentPlan() {
        const select = document.getElementById('paymentPlanMonths');
        select.innerHTML = '';
        for (let i = 1; i <= 36; i++) {
          const option = document.createElement('option');
          option.value = i;
          const label = i === 1 ? t('loans.month') : t('loans.months');
          option.text = `${i} ${label}`;
          select.appendChild(option);
        }
      }
      populatePaymentPlan();

      function updateInstallmentPreview() {
        const principalAmount = parseFloat(document.getElementById('principalAmount').value);
        const profitAmount = parseFloat(document.getElementById('profitAmount').value) || 0;
        const paymentPlanMonths = parseInt(document.getElementById('paymentPlanMonths').value);

        if (principalAmount && paymentPlanMonths && principalAmount > 0) {
          const totalAmount = principalAmount + profitAmount;
          const monthlyPayment = totalAmount / paymentPlanMonths;
          document.getElementById('monthlyPayment').textContent = formatCurrency(monthlyPayment);
          document.getElementById('installmentCount').textContent = paymentPlanMonths;
          document.getElementById('installmentPreview').classList.remove('hidden');
        } else {
          document.getElementById('installmentPreview').classList.add('hidden');
        }
      }

      // Add event listeners
      document.getElementById('principalAmount').addEventListener('input', updateInstallmentPreview);
      document.getElementById('profitAmount').addEventListener('input', updateInstallmentPreview);
      document.getElementById('paymentPlanMonths').addEventListener('change', updateInstallmentPreview);

      // Load loan data
      async function loadLoan() {
        try {
          loanData = await api.loans.getById(loanId);

          // Populate form fields
          document.getElementById('customerName').value = loanData.customer.name;
          const instName = loanData.branch?.institution?.name || loanData.institution?.name || '';
          const brName = loanData.branch?.name || '';
          document.getElementById('branchName').value = brName ? `${instName} - ${brName}` : (instName || (t('loans.form.main_treasury') || 'Main Treasury'));
          document.getElementById('productName').value = loanData.product?.name || '--';
          document.getElementById('principalAmount').value = loanData.principalAmount;
          document.getElementById('profitAmount').value = loanData.profitAmount || 0;
          document.getElementById('paymentPlanMonths').value = loanData.paymentPlanMonths || 1;
          document.getElementById('dueDate').value = loanData.dueDate.split('T')[0];
          document.getElementById('status').value = loanData.status;

          updateInstallmentPreview();

          loadingContainer.style.display = 'none';
          formContainer.style.display = 'block';
        } catch (error) {
          console.error('Error loading loan:', error);
          showToast('Failed to load loan', 'error');
          setTimeout(() => window.location.href = 'loans.html', 2000);
        }
      }

      // Form submission
      document.getElementById('loanForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        // Clear previous errors
        document.querySelectorAll('.error-text').forEach(el => el.classList.add('hidden'));
        document.getElementById('errorMessage').classList.add('hidden');

        // Get form data
        const formData = {
          principalAmount: parseFloat(document.getElementById('principalAmount').value),
          profitAmount: parseFloat(document.getElementById('profitAmount').value) || 0,
          paymentPlanMonths: parseInt(document.getElementById('paymentPlanMonths').value),
          dueDate: document.getElementById('dueDate').value,
          status: document.getElementById('status').value
        };

        // Validate
        let hasError = false;

        if (!formData.principalAmount || formData.principalAmount <= 0) {
          document.getElementById('principalAmountError').textContent = 'Principal amount must be greater than 0';
          document.getElementById('principalAmountError').classList.remove('hidden');
          hasError = true;
        }

        if (!formData.dueDate) {
          document.getElementById('dueDateError').textContent = 'Due date is required';
          document.getElementById('dueDateError').classList.remove('hidden');
          hasError = true;
        }

        if (!formData.status) {
          document.getElementById('statusError').textContent = 'Status is required';
          document.getElementById('statusError').classList.remove('hidden');
          hasError = true;
        }

        if (hasError) {
          return;
        }

        // Submit form
        try {
          const submitBtn = document.getElementById('submitBtn');
          submitBtn.disabled = true;
          submitBtn.textContent = t('loans.edit_page.updating');

          await api.loans.update(loanId, formData);

          showToast('Loan updated successfully', 'success');

          // Redirect to loans page
          setTimeout(() => {
            window.location.href = `loans-view.html?id=${loanId}`;
          }, 1000);
        } catch (error) {
          console.error('Error updating loan:', error);

          // Show error message
          const errorMessage = document.getElementById('errorMessage');
          errorMessage.querySelector('p').textContent = error.message || 'Failed to update loan. Please try again.';
          errorMessage.classList.remove('hidden');

          // Reset button
          const submitBtn = document.getElementById('submitBtn');
          submitBtn.disabled = false;
          submitBtn.textContent = t('loans.edit_page.update_button');

          // Show specific field errors if available
          if (error.errors) {
            Object.keys(error.errors).forEach(field => {
              const errorElement = document.getElementById(`${field}Error`);
              if (errorElement) {
                errorElement.textContent = error.errors[field];
                errorElement.classList.remove('hidden');
              }
            });
          }
        }
      });

      // Load loan on page load
      loadLoan();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPage);
    } else {
      initPage();
    }
  </script>
</body>

</html>
