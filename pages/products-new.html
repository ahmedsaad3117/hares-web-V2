<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product - Q1KEY Platform</title>
  <link rel="stylesheet" href="../css/styles.css?v=18">
  <script src="../js/i18n.js"></script>
</head>

<body>
  <div id="sidebar"></div>

  <div class="main-content">
    <div id="header"></div>

    <div class="page-content">
      <!-- Page Header -->
      <div class="flex items-center gap-3 mb-8"
        style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem;">
        <a href="products.html" class="btn btn-secondary" style="padding: 0.5rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
        </a>
        <div>
          <h1 class="text-3xl font-bold text-white" data-i18n-key="products.add_product">Add Product</h1>
          <p class="text-secondary" data-i18n-key="products.create_new_product">Create a new loan product</p>
        </div>
      </div>

      <!-- Form Card -->
      <div class="glass-card p-6" style="max-width: 800px;">
        <form id="productForm">
          <!-- Institution (Super Admin only) -->
          <!-- Scope & Institution (Super Admin only) -->
          <div id="superAdminFields" style="display: none;">
            <div class="form-group">
              <label class="label" data-i18n-key="products.form.scope_label">Product Scope</label>
              <select id="productScope" class="input">
                <option value="global" data-i18n-key="products.form.scope_global">Global (All Institutions)</option>
                <option value="institution" data-i18n-key="products.form.scope_institution">Institution Specific
                </option>
                <option value="branch" data-i18n-key="products.form.scope_branch">Branch Specific</option>
              </select>
            </div>

            <div class="form-group" id="institutionGroup" style="display: none;">
              <label class="label" data-i18n-key="products.form.institution_label">Institution</label>
              <select id="institutionId" name="institutionId" class="input">
                <option value="" data-i18n-key="products.form.all_institutions">Select Institution</option>
              </select>
            </div>

            <div class="form-group" id="branchGroup" style="display: none;">
              <label class="label" data-i18n-key="products.form.branch_label">Branch</label>
              <select id="branchId" name="branchId" class="input">
                <option value="" data-i18n-key="products.form.select_branch">Select Branch</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="label"><span data-i18n-key="products.form.name_label">Product Name</span> <span
                data-i18n-key="products.form.name_required" class="required-star">*</span></label>
            <input type="text" id="name" name="name" class="input"
              data-i18n-placeholder="products.form.name_placeholder" placeholder="e.g., Personal Loan" required />
          </div>

          <div class="form-group">
            <label class="label"><span data-i18n-key="products.form.description_label">Description</span> <span
                data-i18n-key="products.form.description_required" class="required-star">*</span></label>
            <textarea id="description" name="description" class="input" rows="4"
              data-i18n-placeholder="products.form.description_placeholder"
              placeholder="Describe the loan product features and benefits..." required></textarea>
          </div>

          <div class="form-group">
            <label class="label" data-i18n-key="products.form.status_label">Status</label>
            <select id="isActive" name="isActive" class="input">
              <option value="true" data-i18n-key="products.form.active">Active</option>
              <option value="false" data-i18n-key="products.form.inactive">Inactive</option>
            </select>
          </div>

          <div class="form-group" id="visibilityGroup" style="display: none;">
            <label class="label" data-i18n-key="products.form.visibility_label">Visibility</label>
            <div class="flex items-center gap-2"
              style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;">
              <input type="checkbox" id="isVisibleToBranches" name="isVisibleToBranches" checked
                style="width: 18px; height: 18px; cursor: pointer;" />
              <label for="isVisibleToBranches" class="text-secondary" style="cursor: pointer;"
                data-i18n-key="products.form.visible_to_branches">Visible to branches</label>
            </div>
          </div>

          <div class="flex items-center gap-3"
            style="display: flex; align-items: center; gap: 0.75rem; margin-top: 1.5rem;">
            <button type="submit" class="btn btn-primary">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
              <span data-i18n-key="products.form.create_product">Create Product</span>
            </button>
            <a href="products.html" class="btn btn-secondary" data-i18n-key="products.form.cancel">
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../js/api.js?v=4"></script>
  <script src="../components/sidebar.js?v=12"></script>
  <script src="../components/header.js?v=3"></script>
  <script>
    async function initPage() {
      await waitForI18n();

      if (!isAuthenticated()) {
        window.location.href = '../index.html';
        return;
      }

      const user = getCurrentUser();

      // Refresh profile to get latest subscription data
      try {
        await api.auth.getProfile();
      } catch (e) {
        console.error('Failed to refresh profile:', e);
      }

      // Allow Super Admin, Institution, and Branch roles
      if (!['Super Admin', 'Institution', 'Branch'].includes(user.roleName)) {
        window.location.href = 'dashboard.html';
        return;
      }

      document.getElementById('sidebar').innerHTML = createSidebar(user);
      document.getElementById('header').innerHTML = createHeader(
        t('products.add_product'),
        t('products.create_new_product')
      );
      initializeLanguageSwitcher();
      setActiveNav('products');
      window.i18n.translatePage();

      const visibilityGroup = document.getElementById('visibilityGroup');
      // Institution users see visibility toggle by default
      if (user.roleName === 'Institution') {
        visibilityGroup.style.display = 'block';
      }

      // Load institutions if Super Admin
      if (user.roleName === 'Super Admin') {
        document.getElementById('superAdminFields').style.display = 'block';
        setupSuperAdminLogic();
      }

      async function setupSuperAdminLogic() {
        const scopeSelect = document.getElementById('productScope');
        const institutionSelect = document.getElementById('institutionId');
        const institutionGroup = document.getElementById('institutionGroup');
        const branchSelect = document.getElementById('branchId');
        const branchGroup = document.getElementById('branchGroup');

        // Load institutions one time
        await loadInstitutions();

        scopeSelect.addEventListener('change', () => {
          updateUI(scopeSelect.value);
        });

        institutionSelect.addEventListener('change', () => {
          // If scope is Branch, we need to reload branches for the selected institution
          if (scopeSelect.value === 'branch' && institutionSelect.value) {
            loadBranches(institutionSelect.value);
          } else {
            // Reset branches if no institution or not branch scope
            branchSelect.innerHTML = '<option value="">' + t('products.form.select_branch') + '</option>';
          }
        });

        function updateUI(scope) {
          // Reset states
          institutionSelect.value = '';
          branchSelect.value = '';
          branchSelect.innerHTML = '<option value="">' + t('products.form.select_branch') + '</option>';

          if (scope === 'global') {
            institutionGroup.style.display = 'none';
            branchGroup.style.display = 'none';
          } else if (scope === 'institution') {
            institutionGroup.style.display = 'block';
            branchGroup.style.display = 'none';
          } else if (scope === 'branch') {
            institutionGroup.style.display = 'block';
            branchGroup.style.display = 'block';
          }

          // Show visibility toggle if institution scope is selected
          if (scope === 'institution') {
            visibilityGroup.style.display = 'block';
          } else {
            visibilityGroup.style.display = 'none';
          }
        }

        async function loadInstitutions() {
          try {
            const response = await api.institutions.getAll(1, 100);
            const institutions = response.data || [];
            // Clear and add placeholder
            institutionSelect.innerHTML = '<option value="">' + t('products.form.all_institutions') + '</option>';

            institutions.forEach(inst => {
              const option = document.createElement('option');
              option.value = inst.institutionId;
              option.textContent = translateData(inst.name);
              institutionSelect.appendChild(option);
            });
          } catch (error) {
            console.error('Error loading institutions:', error);
          }
        }

        async function loadBranches(institutionId) {
          try {
            const response = await api.branches.getAll(1, 100, institutionId);
            const branches = response.data || [];
            branchSelect.innerHTML = '<option value="">' + t('products.form.select_branch') + '</option>';

            branches.forEach(branch => {
              const option = document.createElement('option');
              option.value = branch.branchId;
              option.textContent = translateData(branch.name);
              branchSelect.appendChild(option);
            });
          } catch (error) {
            console.error('Error loading branches:', error);
          }
        }
      }

      // Handle form submission
      const form = document.getElementById('productForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = {
          name: document.getElementById('name').value.trim(),
          description: document.getElementById('description').value.trim(),
          isActive: document.getElementById('isActive').value === 'true',
          isVisibleToBranches: document.getElementById('isVisibleToBranches').checked
        };

        // Add institutionId if Super Admin selected one
        if (user.roleName === 'Super Admin') {
          const scope = document.getElementById('productScope').value;
          const institutionId = document.getElementById('institutionId').value;
          const branchId = document.getElementById('branchId').value;

          if (scope === 'institution') {
            if (!institutionId) {
              showToast(t('products.form.institution_required') || 'Institution is required', 'error');
              return;
            }
            formData.institutionId = parseInt(institutionId);
          } else if (scope === 'branch') {
            if (!institutionId) {
              showToast(t('products.form.institution_required') || 'Institution is required', 'error');
              return;
            }
            if (!branchId) {
              showToast(t('products.form.branch_required') || 'Branch is required', 'error');
              return;
            }
            formData.institutionId = parseInt(institutionId);
            formData.branchId = parseInt(branchId);
          }
          // If scope is 'global', institutionId and branchId remain undefined (which API treats as null)
        }

        // Validate
        if (!formData.name) {
          showToast(t('products.form.name_error'), 'error');
          return;
        }

        if (!formData.description) {
          showToast(t('products.form.description_error'), 'error');
          return;
        }

        try {
          await api.products.create(formData);
          showToast('Product created successfully', 'success');
          setTimeout(() => {
            window.location.href = 'products.html';
          }, 1000);
        } catch (error) {
          console.error('Error creating product:', error);
          showToast(error.message || 'Failed to create product', 'error');
        }
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPage);
    } else {
      initPage();
    }
  </script>
</body>

</html>
